services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hoiyong
      POSTGRES_USER: hoiyong
      POSTGRES_PASSWORD: hoiyong_dev_2026
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoiyong -d hoiyong"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sync:
    build:
      context: ./apps/sync-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://hoiyong:hoiyong_dev_2026@postgres:5432/hoiyong
      AUTOCOUNT_DATABASE_URL: postgresql://${RDS_USER}:${RDS_PASSWORD}@${RDS_HOST}:5432/autocount?sslmode=no-verify
      SYNC_PORT: 4000
      SYNC_ON_STARTUP: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://hoiyong:hoiyong_dev_2026@postgres:5432/hoiyong
      RDS_DATABASE_URL: postgresql://${RDS_USER}:${RDS_PASSWORD}@${RDS_HOST}:5432/autocount?sslmode=no-verify
      SYNC_SERVICE_URL: http://sync:4000
    ports:
      - "8000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
